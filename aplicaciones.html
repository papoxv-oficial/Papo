<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background: radial-gradient(circle at center, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding-top: 100px;
            padding-bottom: 50px;
            overflow-x: hidden;
            overflow-y: auto;
            background-attachment: fixed;
        }

        nav {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%;
            height: 60px; 
            background: rgba(0, 0, 0, 0.9);
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 25px; 
            z-index: 999;
            border-bottom: 1px solid #111;
        }

        nav a { 
            color: #aaa; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        nav a.active { 
            color: #ff0000; 
            text-shadow: 0 0 10px #ff0000; 
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .glitch-title {
            font-size: 3rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 15, 15, 0.8);
            border: 2px solid #222;
            border-radius: 30px;
            color: #fff;
            outline: none;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .grid-apps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        .tarjeta-app {
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .tarjeta-app:hover {
            transform: translateY(-10px);
            border-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        }
        
        .img-box {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0d0d0d;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .tarjeta-app h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .btn-tutorial {
            background: transparent;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-tutorial:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="juegos.html">Juegos</a>
        <a href="aplicaciones.html" class="active">Aplicaciones</a>
        <a href="pc.html">Windows & Office</a>
    </nav>

    <div class="container">
        <h1 class="glitch-title">APLICACIONES</h1>

        <div class="search-box">
            <input type="text" id="buscador" placeholder="Buscar aplicación...">
        </div>

        <div class="grid-apps">
            
            <div class="tarjeta-app">
                <div class="img-box">
                    <img src="https://github.io" alt="Minecraft">
                </div>
                <h3>Minecraft Pro</h3>
                <button class="btn-tutorial">Descargar</button>
            </div>

            <div class="tarjeta-app">
                <div class="img-box">
                    <img src="https://github.io" alt="CapCut">
                </div>
                <h3>CapCut Mod</h3>
                <button class="btn-tutorial">Descargar</button>
            </div>

            <div class="tarjeta-app">
                <div class="img-box">
                    <img src="https://github.io" alt="TikTok">
                </div>
                <h3>TikTok Premium</h3>
                <button class="btn-tutorial">Descargar</button>
            </div>

            <div class="tarjeta-app">
                <div class="img-box">
                    <img src="https://github.io" alt="Loquendo">
                </div>
                <h3>Loquendo Voice</h3>
                <button class="btn-tutorial">Descargar</button>
            </div>

            <div class="tarjeta-app">
                <div class="img-box">
                    <img src="https://github.io" alt="Spotify">
                </div>
                <h3>Spotify Plus</h3>
                <button class="btn-tutorial">Descargar</button>
            </div>

        </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const buscador = document.getElementById('buscador');
        const tarjetas = document.querySelectorAll('.tarjeta-app');
        const LOGO_RESPALDO = "https://placeholder.com";

        document.querySelectorAll(".tarjeta-app img").forEach(img => {
            img.addEventListener("error", function() {
                this.src = LOGO_RESPALDO;
            });
        });

        if (buscador) {
            buscador.addEventListener('input', (e) => {
                const texto = e.target.value.toLowerCase().trim();
                tarjetas.forEach(tarjeta => {
                    const nombre = tarjeta.querySelector('h3').textContent.toLowerCase();
                    if (nombre.includes(texto)) {
                        tarjeta.style.display = 'flex';
                    } else {
                        tarjeta.style.display = 'none';
                    }
                });
            });
        }
    });
    </script>

</body>
</html>
