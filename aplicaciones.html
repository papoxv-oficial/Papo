<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ==========================================
           AURORA LÍQUIDA (Fondo dinámico)
           ========================================== */
        body {
            background: radial-gradient(circle at center, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 120px 40px 40px;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 0.8s ease;
            background-attachment: fixed;
        }

        /* Nav de ejemplo (Ajusta los estilos si ya tienes los tuyos) */
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 60px; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            gap: 20px; z-index: 999;
            border-bottom: 1px solid #111;
        }
        nav a { color: #aaa; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        nav a.active { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* ==========================================
           BARRA DE PROGRESO DE LECTURA (SCROLL)
           ========================================== */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff5555);
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            z-index: 9999;
            transition: width 0.1s ease-out;
        }

        /* ==========================================
           CONTENEDOR PRINCIPAL Y BUSCADOR
           ========================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 40px auto 60px;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 30px;
            color: #fff;
            outline: none;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* ==========================================
           TÍTULO CON CYBER GLITCH ALEATORIO
           ========================================== */
        .glitch-title {
            position: relative;
            font-size: 3rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .glitch-active::before,
        .glitch-active::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050000;
        }
        .glitch-active::before {
            left: 2px;
            text-shadow: -2px 0 #00ffff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 0.2s infinite linear alternate-reverse;
        }
        .glitch-active::after {
            left: -2px;
            text-shadow: -2px 0 #ff0000, 0 2px #00ffff;
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 0.2s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            100% { clip: rect(112px, 9999px, 76px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(15px, 9999px, 115px, 0); }
            100% { clip: rect(43px, 9999px, 109px, 0); }
        }

        /* ==========================================
           REJILLA DE TARJETAS (APPS)
           ========================================== */
        .grid-apps {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .tarjeta-app {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
        }
        .tarjeta-app:hover {
            transform: translateY(-8px);
            border-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
        }
        .tarjeta-app img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }
        .tarjeta-app h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
        }
        .btn-tutorial {
            background: transparent;
            border: 1px solid #ff0000;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(255,0,0,0.2);
            transition: all 0.3s ease;
        }
        .btn-tutorial:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        /* ==========================================
           MODAL DE VIDEO FLOTANTE (APPLE STYLE)
           ========================================== */
        .overlay-oculto {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10000;
        }
        .overlay-oculto.activo {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-holograma {
            background: #0a0a0a;
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border-radius: 12px;
            width: 90%; max-width: 800px;
            padding: 20px; position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .overlay-oculto.activo .modal-holograma {
            transform: scale(1);
        }
        #cerrar-modal {
            position: absolute; top: -15px; right: -15px;
            background: #ff0000; color: #fff; border: none;
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
            box-shadow: 0 0 10px #ff0000; font-weight: bold; font-size: 16px;
        }
        .contenedor-video {
            position: relative; padding-bottom: 56.25%; height: 0;
        }
        .contenedor-video iframe {
            position: absolute; top:0; left:0; width:100%; height:100%; border-radius: 6px;
        }
    </style>
</head>
