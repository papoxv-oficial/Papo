<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            padding: 120px 20px 40px 20px; 
            overflow-x: hidden; 
            perspective: 1000px; 
        }
        
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(5, 0, 0, 0.95); 
            border-bottom: 2px solid rgba(255, 0, 0, 0.3); 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            padding: 18px; 
            z-index: 1000; 
        }
        
        .nav-link { 
            color: #b3b3b3; 
            text-decoration: none; 
            font-size: 1rem; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        .nav-link.active { 
            color: #ff0000; 
            text-shadow: 0 0 10px #ff0000; 
        }
        
        .search-container { 
            max-width: 500px; 
            margin: 20px auto 30px auto; 
            display: flex; 
            justify-content: center; 
            width: 100%; 
        }
        
        .search-input { 
            width: 100%; 
            padding: 14px 20px; 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid #ff0000; 
            border-radius: 30px; 
            color: #ffffff; 
            font-size: 1rem; 
            outline: none; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
            transition: all 0.3s ease; 
            text-align: center; 
        }
        
        .search-input::placeholder { 
            color: #888888; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
        }
        
        .search-input:focus { 
            box-shadow: 0 0 25px #ff0000; 
            background: rgba(15, 5, 5, 0.8); 
        }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .card { 
            background: rgba(15, 5, 5, 0.5); 
            border: 2px solid #ff0000; 
            border-radius: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); 
            padding: 25px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            height: 440px; 
            width: 100%; 
            max-width: 340px; 
            justify-content: space-between; 
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease; 
            cursor: pointer; 
            transform-style: preserve-3d; 
        }
        
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 2px; transform: translateZ(20px); }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; transform: translateZ(15px); }
        
        /* Contenedor fijo para que las imágenes NO alteren el tamaño de la tarjeta */
        .img-container {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateZ(25px);
            margin: 5px 0;
        }

        .card-img { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }
        
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; transform-style: preserve-3d; transform: translateZ(15px); }
        .btn-action { display: block; width: 100%; padding: 12px; color: #ffffff; text-decoration: none; font-weight: bold; font-size: 0.9rem; border-radius: 15px; text-transform: uppercase; text-align: center; letter-spacing: 1px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; }
        .btn-tutorial { background: #00a2ff; box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); }
        .btn-download { background: #a200ff; box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); }
        
        .btn-tutorial:hover { transform: translateZ(25px) scale(1.04); box-shadow: 0 10px 20px rgba(0, 162, 255, 0.6); }
        .btn-download:hover { transform: translateZ(25px) scale(1.04); box-shadow: 0 10px 20px rgba(162, 0, 255, 0.6); }
        .btn-action i { margin-right: 6px; }

        #notification-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast-notification { background: rgba(0, 0, 0, 0.8); border: 2px solid #ff0000; border-radius: 12px; padding: 16px 28px; color: #ffffff; font-weight: bold; font-size: 0.95rem; box-shadow: 0 0 25px rgba(255, 0, 0, 0.7); display: flex; align-items: center; opacity: 0; transform: translateY(20px); transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-notification.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="juegos.html" class="nav-link">Juegos</a>
        <a href="aplicaciones.html" class="nav-link active">Aplicaciones</a>
        <a href="pc.html" class="nav-link">Windows & Office</a>
    </div>
    
    <div id="notification-container"></div>
    
    <div class="search-container">
        <input type="text" class="search-input" id="buscador-campo" oninput="ejecutarBusqueda()" placeholder="🔍 Buscar aplicación...">
    </div>
    
    <div class="grid-container">
        <!-- 1. CapCut -->
        <div class="card">
            <div>
                <div class="card-title">CapCut Pro</div>
                <div class="card-subtitle">(Premium Mod)</div>
            </div>
            <div class="img-container">
                <img class="card-img" src="https://sftcdn.net" alt="CapCut">
            </div>
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a>
                <a href="#" class="btn-action btn-download btn-notify" data-name="CapCut Pro"><i class="fas fa-download"></i> Descargar</a>
            </div>
        </div>

        <!-- 2. TikTok -->
        <div class="card">
            <div>
                <div class="card-title">TikTok Plus</div>
                <div class="card-subtitle">(No Watermark)</div>
            </div>
            <div class="img-container">
                <img class="card-img" src="https://flaticon.com" alt="TikTok">
            </div>
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a>
                <a href="#" class="btn-action btn-download btn-notify" data-name="TikTok Plus"><i class="fas fa-download"></i> Descargar</a>
            </div>
        </div>

        <!-- 3. Loquendo -->
        <div class="card">
            <div>
                <div class="card-title">Loquendo Voice</div>
                <div class="card-subtitle">(PC)</div>
            </div>
            <div class="img-container">
                <img class="card-img" src="https://postimg.cc" alt="Loquendo">
            </div>
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a>
                <a href="https://cuty.io" class="btn-action btn-download btn-notify" data-name="Loquendo Voice"><i class="fas fa-download"></i> Descargar</a>
            </div>
        </div>

        <!-- 4. Spotify Plus -->
        <div class="card">
            <div>
                <div class="card-title">Spotify Plus</div>
                <div class="card-subtitle">(PC)</div>
            </div>
            <div class="img-container">
                <img class="card-img" src="https://flaticon.com" alt="Spotify">
            </div>
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial"><i class="fas fa-play-circle"></i> Ver Tutorial</a>
                <a href="#" class="btn-action btn-download btn-notify" data-name="Spotify Plus"><i class="fas fa-download"></i> Descargar</a>
            </div>
        </div>
    </div>

    <script>
        function ejecutarBusqueda() {
            let input = document.getElementById('buscador-campo').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('card-title').textContent.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        document.querySelectorAll('.btn-notify').forEach(button => {
            button.addEventListener('click', function(e) {
                let appName = this.getAttribute('data-name');
