<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones Pro</title>
    <style>
        /* Reseteo básico */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: radial-gradient(circle, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 120px 20px 40px 20px;
        }
        
        /* Menú Superior */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 0, 0, 0.95);
            border-bottom: 2px solid rgba(255, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 18px;
            z-index: 1000;
        }
        .nav-link {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .nav-link.active {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
        
        /* Contenedor de Tarjetas */
        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1200px;
            margin: 40px auto 0 auto;
            justify-content: center;
        }
        
        /* DISEÑO ORIGINAL REPARADO: Negro puro con fuerte brillo rojo */
        .card {
            background: #000000;
            border: 2px solid #ff0000;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 420px;
            width: 100%;
            max-width: 340px;
            justify-content: space-between;
        }
        
        .card-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 2px; }
        .card-subtitle { font-size: 0.8rem; color: #ff0000; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .card-img { width: 100%; max-width: 140px; height: 80px; object-fit: contain; margin: 15px 0; }
        .btn-group { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        
        /* Botones de acción con esquinas originales */
        .btn-action {
            display: block;
            width: 100%;
            padding: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 15px;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }
        
        /* Colores planos originales de tus botones */
        .btn-tutorial { 
            background: #00a2ff; 
            box-shadow: 0 4px 10px rgba(0, 162, 255, 0.3); 
        }
        .btn-download { 
            background: #a200ff; 
            box-shadow: 0 4px 10px rgba(162, 0, 255, 0.3); 
        }
        
        .btn-action:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <!-- MENÚ SUPERIOR -->
    <div class="navbar">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="juegos.html" class="nav-link">Juegos</a>
        <a href="aplicaciones.html" class="nav-link active">Aplicaciones</a>
        <a href="pc.html" class="nav-link">Windows & Office</a>
    </div>

    <!-- CUADRÍCULA DE ARCHIVOS -->
    <div class="grid-container">
        
        <!-- TARJETA 1: LOQUENDO VOICE -->
        <div class="card">
            <div>
                <div class="card-title">Loquendo Voice</div>
                <div class="card-subtitle">(Portable PC)</div>
            </div>
            <!-- Tu enlace original reparado para que cargue el logo -->
            <img class="card-img" src="https://nocookie.net" alt="Loquendo">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="https://cuty.io/tfvJsHSet" class="btn-action btn-download">Descargar</a>
            </div>
        </div>

        <!-- TARJETA 2: CAPCUT PRO -->
        <div class="card">
            <div>
                <div class="card-title">CapCut Pro</div>
                <div class="card-subtitle">(Full Desbloqueado)</div>
            </div>
            <!-- Recuerda subir capcut.png a tu repositorio para que no salga rota -->
            <img class="card-img" src="capcut.png" alt="CapCut">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="#" class="btn-action btn-download">Descargar</a>
            </div>
        </div>

        <!-- TARJETA 3: TIKTOK -->
        <div class="card">
            <div>
                <div class="card-title">TikTok</div>
                <div class="card-subtitle">(Full Desbloqueado)</div>
            </div>
            <!-- Recuerda subir tiktok.png a tu repositorio para que no salga rota -->
            <img class="card-img" src="tiktok.png" alt="TikTok">
            <div class="btn-group">
                <a href="#" class="btn-action btn-tutorial">Ver Tutorial</a>
                <a href="#" class="btn-action btn-download">Descargar</a>
            </div>
        </div>

    </div>

</body>
</html>
