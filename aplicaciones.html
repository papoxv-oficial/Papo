<!DOCTYPE html>
<html lang="es" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papoxv | Aplicaciones</title>
    
    <style>
        /* ==========================================================================
           1. RESET DE ESTILOS BASE Y CONFIGURACIÓN DEL FONDO (AURORA LÍQUIDA)
           ========================================================================== */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background: radial-gradient(circle at center, #2a0000 0%, #050000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 130px 0 40px;
            overflow-x: hidden;
            overflow-y: auto;
            transition: background 0.8s ease;
            background-attachment: fixed;
        }

        /* Menú de Navegación Superior */
        nav {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%;
            height: 60px; 
            background: rgba(0,0,0,0.9);
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 25px; 
            z-index: 999;
            border-bottom: 1px solid #111;
        }

        nav a { 
            color: #aaa; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 14px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        nav a.active { 
            color: #ff0000; 
            text-shadow: 0 0 10px #ff0000; 
        }

        /* ==========================================================================
           2. INTERFAZ: BARRA DE PROGRESO, BUSCADOR Y GLITCH
           ========================================================================== */
        #scroll-progress {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 0%; 
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff5555);
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            z-index: 9999;
            transition: width 0.1s ease-out;
        }

        .container {
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }

        .glitch-title {
            position: relative;
            font-size: 3rem;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .glitch-active::before,
        .glitch-active::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050000;
        }
        
        .glitch-active::before {
            left: 2px; 
            text-shadow: -2px 0 #00ffff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 0.2s infinite linear alternate-reverse;
        }
        
        .glitch-active::after {
            left: -2px; 
            text-shadow: -2px 0 #ff0000, 0 2px #00ffff;
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 0.2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            100% { clip: rect(112px, 9999px, 76px, 0); }
        }
        
        @keyframes glitch-anim2 {
            0% { clip: rect(15px, 9999px, 115px, 0); }
            100% { clip: rect(43px, 9999px, 109px, 0); }
        }

        .search-box {
            position: relative;
            max-width: 500px;
            margin: 30px auto 40px;
            padding: 0 20px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 15, 15, 0.8);
            border: 2px solid #222;
            border-radius: 30px;
            color: #fff;
            outline: none;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        /* ==========================================================================
           3. ESTILOS DEL CARRUSEL EN LA PANTALLA (ESTILO STEAM DECK)
           ========================================================================== */
        .carrusel-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 40px 0;
        }

        .carrusel-contenedor {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding: 20px 50vw; 
            scroll-behavior: smooth;
            scrollbar-width: none;
            cursor: grab;
            scroll-snap-type: x mandatory;
        }

        .carrusel-contenedor::-webkit-scrollbar {
            display: none;
        }

        .carrusel-contenedor:active {
            cursor: grabbing;
        }

        .tarjeta-app {
            flex: 0 0 280px;
            background: rgba(15, 15, 15, 0.9);
            border: 2px solid #222;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            scroll-snap-align: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.35;
            transform: scale(0.85);
        }
        
        .tarjeta-app.focused {
            opacity: 1;
            transform: scale(1.1) translateY(-10px);
            border-color: #ff0000;
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(255, 0, 0, 0.2);
        }
        
        .img-box {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #0d0d0d;
            border-radius: 22px;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        .tarjeta-app.focused .img-box {
            transform: scale(1.05);
            border-color: #ff0000;
        }

        .tarjeta-app img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .tarjeta-app h3 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .btn-tutorial {
            background: transparent;
            border: 2px solid #ff0000;
            color: #fff;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 85%;
            opacity: 0;
            pointer-events: none;
        }

        .tarjeta-app.focused .btn-tutorial {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-tutorial:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .swipe-hint {
            color: #444;
            font-size: 13px;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* ==========================================================================
           4. MODAL DE REPRODUCCIÓN FLOTANTE (ESTILO APPLE HOLOGRÁFICO)
           ========================================================================== */
        .overlay-oculto {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 10000;
        }

        .overlay-oculto.activo {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-holograma {
            background: #0a0a0a;
            border: 2px solid #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            border-radius: 12px;
            width: 90%; max-width: 800px;
            padding: 20px; position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .overlay-oculto.activo .modal-holograma {
            transform: scale(1);
        }

        #cerrar-modal {
            position: absolute; top: -15px; right: -15px;
            background: #ff0000; color: #fff; border: none;
            border-radius: 50%; width: 35px; height: 35px; cursor: pointer;
            box-shadow: 0 0 10px #ff0000; font-weight: bold; font-size: 16px;
        }

        .contenedor-video {
            position: relative; padding-bottom: 56.25%; height: 0;
        }

        .contenedor-video iframe {
            position: absolute; top:0; left:0; width:100%; height:100%; border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- BARRA DE INTERFAZ DEL PROGRESO -->
    <div id="scroll-progress"></div>

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav>
