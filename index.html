<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPOXV | Inicio</title>
    <style>
        /* Reseteo básico */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Fondo degradado oscuro original */
        body { 
            background: radial-gradient(circle, #2a0000 0%, #050000 100%); 
            color: #ffffff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        /* Título PAPOXV con efecto neón rojo */
        .logo { 
            font-size: 4rem; 
            font-weight: 900; 
            color: #ff0000; 
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; 
            margin-bottom: 40px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
        }
        
        /* Contenedor de los botones del centro */
        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            width: 100%; 
            max-width: 600px; 
        }
        
        /* Botones gigantes con bordes rojos brillantes */
        .menu-btn { 
            display: block; 
            width: 100%; 
            padding: 25px; 
            background: #000000; 
            border: 2px solid #ff0000; 
            border-radius: 16px; 
            color: #ffffff; 
            font-size: 1.5rem; 
            font-weight: bold; 
            text-decoration: none; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: all 0.3s ease; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
        }
        
        /* Efecto al pasar el mouse por encima de los botones */
        .menu-btn:hover { 
            transform: scale(1.02); 
            box-shadow: 0 0 25px #ff0000; 
            background: rgba(42, 0, 0, 0.4); 
        }
        
        /* Pie de página */
        footer { 
            margin-top: 50px; 
            font-size: 0.85rem; 
            color: #555555; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <!-- Tu logotipo original -->
    <div class="logo">PAPOXV</div>

    <!-- Menú de navegación principal con rutas relativas corregidas -->
    <div class="menu-container">
        <a href="juegos.html" class="menu-btn">Juegos</a>
        <a href="aplicaciones.html" class="menu-btn">Aplicaciones</a>
        <a href="pc.html" class="menu-btn">Windows & Office</a>
    </div>

    <!-- Tu pie de página original -->
    <footer>
        © 2026 papoxv | Todos los derechos reservados.
    </footer>

</body>
</html>
