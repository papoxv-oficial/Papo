<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papo - Mi Espacio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-size: 2.5rem;
            color: #00f3ff;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            margin-bottom: 50px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 25px;
            background: transparent;
            color: #00f3ff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border: 2px solid #00f3ff;
            border-radius: 12px;
            box-shadow: inset 0 0 8px rgba(0, 243, 255, 0.2), 0 0 8px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #00f3ff;
            color: #0b0f19;
            box-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎮 El Espacio de Papo</h1>

    <div class="container">
        <!-- Reemplaza los '#' por los enlaces de descarga reales en el futuro -->
        <a href="#" class="btn">🚀 Mis Juegos</a>
        <a href="#" class="btn">📱 Mis Aplicaciones</a>
    </div>

</body>
</html>
